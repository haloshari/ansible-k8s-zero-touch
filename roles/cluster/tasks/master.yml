---
- name: Initialize Kubernetes Cluster
  # Developed by [Hassan Aloshari]
  shell: kubeadm init --pod-network-cidr={{ pod_network_cidr }} --cri-socket=/run/containerd/containerd.sock
  register: kubeadm_init
  changed_when: '"To start using your cluster, you need to run the following as a regular user" in kubeadm_init.stdout'

- name: Set up kubeconfig for the current user
  shell: |
    mkdir -p $HOME/.kube
    cp -i /etc/kubernetes/admin.conf $HOME/.kube/config
    chown $(id -u):$(id -g) $HOME/.kube/config
  when: kubeadm_init.changed

- name: Install Network Plugin (CNI)
  shell: kubectl apply -f {{ cni_manifest_url }}
  when: kubeadm_init.changed
  ignore_errors: yes

- name: Get Kubeadm Join Command
  shell: kubeadm token create --print-join-command
  register: join_command
  when: kubeadm_init.changed

- name: Save Join Command to File
  copy:
    content: "{{ join_command.stdout }}"
    dest: /tmp/kubeadm_join.sh
  when: kubeadm_init.changed